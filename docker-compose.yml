services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: studybuddy_backend
    ports:
      - "8000:80"
    volumes:
      - ./backend:/var/www/html
    depends_on:
      - db
    command: >
      bash -c "cd /var/www/html &&
               composer install --no-dev --optimize-autoloader &&
               apache2-foreground"

  db:
    image: mysql:8.0
    container_name: studybuddy_db
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: studybuddy
    volumes:
      - db_data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: studybuddy_phpmyadmin
    ports:
      - "8080:80"
    environment:
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD: root
    depends_on:
      - db

  frontend:
    image: node:20
    container_name: studybuddy_frontend
    working_dir: /app
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run dev -- --host"

volumes:
  db_data: